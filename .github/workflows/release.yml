name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/pkg
          cp "target/${{ matrix.target }}/release/capm" dist/pkg/capm
          tar -C dist/pkg -czf "dist/capm-${{ matrix.target }}.tar.gz" capm
          shasum -a 256 "dist/capm-${{ matrix.target }}.tar.gz" > "dist/capm-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: capm-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release and update tap
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" dist/capm-*.tar.gz dist/capm-*.tar.gz.sha256 \
            --title "$TAG_NAME" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not set; skipping tap update."
            exit 0
          fi

          VERSION="${TAG_NAME#v}"
          AARCH64_MAC_SHA="$(cut -d ' ' -f 1 dist/capm-aarch64-apple-darwin.tar.gz.sha256)"
          X86_64_MAC_SHA="$(cut -d ' ' -f 1 dist/capm-x86_64-apple-darwin.tar.gz.sha256)"
          X86_64_LINUX_SHA="$(cut -d ' ' -f 1 dist/capm-x86_64-unknown-linux-gnu.tar.gz.sha256)"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/turinmouse/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/capm.rb <<EOF
          class Capm < Formula
            desc "Manage coding-agent API provider profiles"
            homepage "https://github.com/turinmouse/coding-agent-profile-manager"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/turinmouse/coding-agent-profile-manager/releases/download/${TAG_NAME}/capm-aarch64-apple-darwin.tar.gz"
                sha256 "${AARCH64_MAC_SHA}"
              end

              on_intel do
                url "https://github.com/turinmouse/coding-agent-profile-manager/releases/download/${TAG_NAME}/capm-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_64_MAC_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/turinmouse/coding-agent-profile-manager/releases/download/${TAG_NAME}/capm-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${X86_64_LINUX_SHA}"
              end
            end

            def install
              bin.install "capm"
            end

            test do
              assert_match "capm #{version}", shell_output("#{bin}/capm --version")
              assert_match "unset OPENAI_API_KEY", shell_output("#{bin}/capm init zsh")
            end
          end
          EOF

          ruby -c tap/Formula/capm.rb

          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/capm.rb

          if git -C tap diff --cached --quiet; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi

          git -C tap commit -m "Update capm to ${TAG_NAME}"
          git -C tap push origin main
